name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches setup.cfg version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CFG_VERSION=$(grep '^version = ' setup.cfg | sed 's/version = //')
          echo "Git tag version : $TAG_VERSION"
          echo "setup.cfg version: $CFG_VERSION"
          if [ "$TAG_VERSION" != "$CFG_VERSION" ]; then
            echo ""
            echo "ERROR: Version mismatch!"
            echo "  Git tag  -> $TAG_VERSION"
            echo "  setup.cfg -> $CFG_VERSION"
            echo ""
            echo "Update 'version = $TAG_VERSION' in setup.cfg and push before re-releasing."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install build
        run: pip install build
      - name: Build package
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/plover-steno-dojo/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
